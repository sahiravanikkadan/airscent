{% extends "base.html" %}
{% block title %}Login - TaskFlow{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="AAMCO" height="50" class="d-block mx-auto mb-2">
                    <div class="text-primary fw-semibold mx-auto" style="font-size: 0.7rem; letter-spacing: 2px;">AIRSCENT ARABIA MANUFACTURING CO.</div>
                    <hr class="mx-auto mt-3 mb-2" style="width: 60%; opacity: 0.2;">
                    <p class="text-muted mb-0">Sign in to your account</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
